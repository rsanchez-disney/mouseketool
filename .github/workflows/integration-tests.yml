name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            playwright-tests/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install test dependencies
        run: cd playwright-tests && npm ci

      - name: Install Playwright browsers
        run: cd playwright-tests && npx playwright install chromium

      - name: Build backend
        run: cd backend && npx tsc

      - name: Pull LocalStack image
        run: docker pull localstack/localstack

      - name: Run integration tests
        run: cd playwright-tests && npx playwright test --config=playwright.integration.config.ts --reporter=github
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: playwright-tests/test-results/
          retention-days: 7
